name: Terraform Deployment

on:
  push:
    branches:
      - main

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: self-hosted

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Clean and authenticate via OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::350758825711:role/GitHubActionsRole
          aws-region: ap-south-2
          unset-current-credentials: true # Flushes out stale host credentials

      # Force Terraform to use the correct region for the S3 backend
      - name: Terraform Init
        run: terraform init
        env:
          AWS_DEFAULT_REGION: ap-south-2
          AWS_REGION: ap-south-2

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          AWS_DEFAULT_REGION: ap-south-2
          AWS_REGION: ap-south-2

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: self-hosted

    permissions:
      id-token: write
      contents: read

    environment:
      name: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::350758825711:role/GitHubActionsRole
          aws-region: ap-south-2
          unset-current-credentials: true 

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Init
        run: terraform init
        env:
          AWS_DEFAULT_REGION: ap-south-2
          AWS_REGION: ap-south-2

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          AWS_DEFAULT_REGION: ap-south-2
          AWS_REGION: ap-south-2
